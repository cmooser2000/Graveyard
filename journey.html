<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F0E8D6">
  <title>Headstone History</title>
  <meta name="description" content="Seven stones. Seven stories.">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<main>
  <!-- Back to home -->
  <p class="back-home"><a href="/">&larr; Home</a></p>

  <!-- Chapter marker -->
  <div class="chapter" id="chapter">Chapter</div>

  <!-- Name + optional years -->
  <h1 class="name" id="name">&nbsp;</h1>
  <p class="years muted hidden" id="years"></p>

  <!-- Rule with ornament -->
  <div class="rule" aria-hidden="true">
    <span class="rule-mark"></span>
  </div>

  <!-- Per-grave "find the headstone" heading (hidden on revisit) -->
  <p class="find-heading" id="findHeading">&nbsp;</p>

  <!-- Map (shown only until the year is entered) -->
  <figure class="map-block" id="mapBlock">
    <img id="mapImage" alt="Map showing the location of the grave">
    <figcaption class="map-caption" id="mapCaption"></figcaption>
  </figure>

  <!-- Prompt + form -->
  <div class="form-block" id="formBlock">
    <p class="prompt" id="prompt">&nbsp;</p>
    <form id="yearForm" novalidate>
      <input
        type="number"
        id="yearInput"
        class="year-input"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="4"
        min="1500"
        max="2100"
        autocomplete="off"
        aria-label="Year of passing"
        placeholder="&mdash;&mdash;&mdash;&mdash;"
        required>
      <div class="form-error" id="formError">Not quite &mdash; try again.</div>
      <button type="submit" class="btn" id="unlockBtn">Unlock</button>
    </form>
  </div>

  <!-- Video -->
  <div class="video-block" id="videoBlock">
    <div class="video-wrap" id="videoWrap">
      <video id="video" preload="metadata"></video>
      <div class="play-indicator" id="playIndicator" aria-hidden="true"></div>
    </div>

    <div class="post-video" id="postVideo">
      <a href="#" class="btn" id="continueBtn">Continue &rarr;</a>
      <button type="button" class="watch-again" id="watchAgainBtn">Watch again</button>
    </div>
  </div>

  <!-- Stories panel — grows as graves are unlocked -->
  <nav class="story-list hidden" id="storyList" aria-label="Your unlocked stories">
    <p class="story-list-heading">Go back to your stories</p>
    <ul id="storyListItems"></ul>
    <p class="story-list-home"><a href="/">&larr; Go back home</a></p>
  </nav>

  <!-- Chapter crumb -->
  <p class="crumb" id="crumb">Chapter &mdash; of seven</p>
</main>

<script src="/journey.js"></script>
</body>
</html>
