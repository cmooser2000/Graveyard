<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F0E8D6">
  <title>Congratulations &mdash; Headstone History</title>
  <meta name="description" content="You found all seven graves.">
  <link rel="stylesheet" href="/styles.css">
  <script>
    // Gate: only show this page if all seven graves are completed.
    (function () {
      try {
        var raw = localStorage.getItem('eden_progress');
        var p = raw ? JSON.parse(raw) : null;
        if (!p || !Array.isArray(p.completed) || p.completed.indexOf(7) === -1) {
          window.location.replace('/journey.html');
        }
      } catch (e) {
        window.location.replace('/journey.html');
      }
    })();
  </script>
</head>
<body>

<main>

  <h1 class="hero-title congrats-title">Congratulations!</h1>
  <p class="congrats-subtitle">You found all the graves.</p>

  <div class="rule" aria-hidden="true">
    <span class="rule-mark"></span>
  </div>

  <!-- Certificate-of-completion generator -->
  <section class="cert" aria-label="Certificate of completion">

    <!-- Form (visible until generated) -->
    <div class="cert-form" id="certForm">
      <p class="cert-pitch">Make your Headstone History certificate of completion.</p>
      <form id="certFormForm" novalidate>
        <label class="cert-field">
          <span>First name <em>(up to 14 letters)</em></span>
          <input type="text" id="firstName" autocomplete="given-name" required maxlength="14">
        </label>
        <label class="cert-field">
          <span>Last name <em>(up to 14 letters)</em></span>
          <input type="text" id="lastName" autocomplete="family-name" required maxlength="14">
        </label>
        <label class="cert-field">
          <span>Date</span>
          <input type="date" id="completionDate" required>
        </label>
        <button type="submit" class="btn">Make my certificate</button>
      </form>
    </div>

    <!-- Generated headstone (revealed on submit) -->
    <figure class="cert-stone" id="certStone" hidden>
      <div class="stone-wrap">
        <img src="/maps/certificate-stone.jpg" alt="" class="stone-bg">
        <div class="stone-overlay">
          <p class="stone-name" id="certName"></p>
          <p class="stone-body">completed the</p>
          <p class="stone-tour">Mount Desert Street<br>Cemetery Tour</p>
          <p class="stone-date" id="certDate"></p>
        </div>
      </div>
      <figcaption class="cert-hint" id="certHint">Save or share your certificate below.</figcaption>
    </figure>

    <div class="cert-actions" id="certActions" hidden>
      <div class="cert-share">
        <button type="button" class="btn cert-share-btn" id="shareBtn">Share certificate</button>
        <button type="button" class="btn btn-secondary cert-share-btn" id="downloadBtn">Download image</button>
        <a class="cert-link" id="emailBtn" href="#">Email a link to a friend</a>
      </div>
      <button type="button" class="cert-link cert-link--secondary" id="makeAnotherBtn">&larr; Make another</button>
    </div>

  </section>

  <div class="cta-group cert-cta-group">
    <a href="/journey.html?grave=1" class="btn">Go back to your stories</a>
    <button type="button" class="btn" id="playAgainBtn">Play again</button>
  </div>

  <p class="page-footer">A project at the Mount Desert Street Cemetery &middot; Bar Harbor, Maine</p>
</main>

<script>
  (function () {
    'use strict';

    // Default the date to today
    var dateInput = document.getElementById('completionDate');
    if (dateInput) {
      var t = new Date();
      var iso = t.getFullYear() + '-' +
                String(t.getMonth() + 1).padStart(2, '0') + '-' +
                String(t.getDate()).padStart(2, '0');
      dateInput.value = iso;
    }

    function formatDate(iso) {
      // iso = YYYY-MM-DD
      var parts = iso.split('-');
      if (parts.length !== 3) return iso;
      var year = parseInt(parts[0], 10);
      var month = parseInt(parts[1], 10) - 1;
      var day = parseInt(parts[2], 10);
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      if (month < 0 || month > 11 || isNaN(year) || isNaN(day)) return iso;
      return months[month] + ' ' + day + ', ' + year;
    }

    var form    = document.getElementById('certFormForm');
    var formBox = document.getElementById('certForm');
    var stone   = document.getElementById('certStone');
    var actions = document.getElementById('certActions');
    var nameEl  = document.getElementById('certName');
    var dateEl  = document.getElementById('certDate');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var first = document.getElementById('firstName').value.trim();
      var last  = document.getElementById('lastName').value.trim();
      var date  = document.getElementById('completionDate').value;
      if (!first || !last || !date) return;

      nameEl.textContent = first + ' ' + last;
      dateEl.textContent = formatDate(date);

      formBox.hidden = true;
      stone.hidden = false;
      actions.hidden = false;
      stone.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    document.getElementById('makeAnotherBtn').addEventListener('click', function () {
      stone.hidden = true;
      actions.hidden = true;
      formBox.hidden = false;
      document.getElementById('firstName').focus();
    });

    document.getElementById('playAgainBtn').addEventListener('click', function () {
      try { localStorage.removeItem('eden_progress'); } catch (e) {}
      window.location.href = '/';
    });

    // ── Share / Download / Email ─────────────────────────────────
    var shareBtn    = document.getElementById('shareBtn');
    var downloadBtn = document.getElementById('downloadBtn');
    var emailBtn    = document.getElementById('emailBtn');
    var hintEl      = document.getElementById('certHint');
    var stoneWrap   = document.querySelector('.stone-wrap');

    var SHARE_URL   = 'https://headstonehistory.org/';
    var SHARE_TITLE = 'Headstone History — Mount Desert Street Cemetery Tour';
    var SHARE_TEXT  = 'I just completed the Headstone History tour at the Mount Desert Street Cemetery in Bar Harbor, Maine. You can take it too: ' + SHARE_URL;
    var EMAIL_SUBJECT = SHARE_TITLE;
    var EMAIL_BODY  = 'I just completed the Headstone History tour at the Mount Desert Street Cemetery in Bar Harbor, Maine. A scavenger hunt through seven 19th-century graves — you can take it too:\n\n' + SHARE_URL + '\n';

    // Wire the mailto link
    if (emailBtn) {
      emailBtn.href = 'mailto:?subject=' + encodeURIComponent(EMAIL_SUBJECT)
                    + '&body=' + encodeURIComponent(EMAIL_BODY);
    }

    // Render the certificate stone-wrap to a PNG blob via html-to-image.
    async function renderCertificateBlob() {
      if (!window.htmlToImage) throw new Error('html-to-image not loaded');
      // Wait for fonts so Demo Love Struck / Long Island Antiqua render correctly
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      // pixelRatio 3 → exports at 960×1473 for crisp display + email inline preview
      return window.htmlToImage.toBlob(stoneWrap, {
        pixelRatio: 3,
        backgroundColor: '#F0E8D6',
        cacheBust: true,
      });
    }

    function blobToFile(blob, filename) {
      try { return new File([blob], filename, { type: blob.type || 'image/png' }); }
      catch (e) { return blob; }
    }

    function triggerDownload(blob, filename) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }

    function setHint(msg) { if (hintEl) hintEl.textContent = msg; }

    if (shareBtn) {
      shareBtn.addEventListener('click', async function () {
        shareBtn.disabled = true;
        var originalText = shareBtn.textContent;
        shareBtn.textContent = 'Rendering…';
        try {
          var blob = await renderCertificateBlob();
          if (!blob) throw new Error('render failed');
          var file = blobToFile(blob, 'headstone-history-certificate.png');

          // Use Web Share API with file if supported (best on mobile)
          if (navigator.canShare && file instanceof File && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({
                files: [file],
                title: SHARE_TITLE,
                text:  SHARE_TEXT,
              });
              setHint('Thanks for sharing!');
            } catch (err) {
              // User cancelled — silent
              if (err && err.name !== 'AbortError') {
                triggerDownload(blob, 'headstone-history-certificate.png');
                setHint('Your certificate has been downloaded.');
              }
            }
          } else {
            // Fallback: download the image
            triggerDownload(blob, 'headstone-history-certificate.png');
            setHint('Your certificate has been downloaded — attach it to an email to share.');
          }
        } catch (err) {
          console.error(err);
          setHint('Sorry — couldn’t render the certificate. Try the Download button.');
        } finally {
          shareBtn.disabled = false;
          shareBtn.textContent = originalText;
        }
      });
    }

    if (downloadBtn) {
      downloadBtn.addEventListener('click', async function () {
        downloadBtn.disabled = true;
        var originalText = downloadBtn.textContent;
        downloadBtn.textContent = 'Rendering…';
        try {
          var blob = await renderCertificateBlob();
          triggerDownload(blob, 'headstone-history-certificate.png');
          setHint('Your certificate has been downloaded.');
        } catch (err) {
          console.error(err);
          setHint('Sorry — couldn’t render the certificate. Try taking a screenshot instead.');
        } finally {
          downloadBtn.disabled = false;
          downloadBtn.textContent = originalText;
        }
      });
    }
  })();
</script>

<!-- Vendored locally so the share/download buttons work offline at the cemetery. -->
<script src="/js/html-to-image.min.js"></script>

</body>
</html>
